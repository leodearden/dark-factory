# Dark Factory — project-specific orchestrator overrides.
# Core defaults are in the orchestrator package (defaults.yaml).

max_concurrent_tasks: 24

# Verification commands (dark-factory multi-subproject layout)
# test_command fans out per-subproject so each runs in its own venv with its
# own pyproject.toml (per-test timeout, -n auto, -m 'not integration', …).
# Bare ``pytest`` at the worktree root collects every subproject's tests/ into
# one process and only honours the root pyproject.toml — slow + cross-process
# state pollution. With Fix 1's docs-only short-circuit + per-subproject
# fan-out for non-prefixed source, this command rarely fires; when it does
# (root conftest.py changes), the fan-out keeps it safe.
test_command: "cd shared && uv run pytest tests/ && cd ../escalation && uv run pytest tests/ && cd ../orchestrator && uv run pytest tests/ && cd ../fused-memory && uv run pytest tests/ && cd ../dashboard && uv run pytest tests/"
lint_command: "ruff check shared escalation fused-memory orchestrator dashboard"
type_check_command: "cd fused-memory && npx pyright && cd ../orchestrator && npx pyright && cd ../dashboard && npx pyright"

# Verification timeouts — dark-factory is Python-only (no cargo builds), so the
# package defaults (1800s warm / 5400s cold, sized for reify's big Rust builds)
# are much too loose. Full warm verify here is ~2 min; cold adds uv sync across
# 6 subprojects (~3 min). Tight timeouts surface hangs (e.g. asyncio-sleep
# loops in a misconfigured mock) on the first verify that touches the module,
# not 8 days later at a post-completion full review.
verify_command_timeout_secs: 600
verify_cold_command_timeout_secs: 1200

# Fused memory HTTP server — port 8002
# Port scheme: reify=xxx0, autopilot-video=xxx1, dark-factory=xxx2
fused_memory:
  url: "http://localhost:8002"
  project_id: "dark_factory"
  config_path: "fused-memory/config/config.yaml"
  server_command: []

# Escalation — port 8102 (matches .mcp.json so interactive sessions share the server)
escalation:
  queue_dir: "data/escalations"
  port: 8102

# Per-role turn budgets. Raising the architect budget is a direct response to
# silent max_turns exits on large-scope tasks: the architect now has headroom
# to verify premises and produce a plan without the CLI truncating mid-tool-call.
max_turns:
  architect: 120

# Usage cap / multi-account failover
usage_cap:
  enabled: true
  accounts_file: "${USAGE_ACCOUNTS_FILE:/home/leo/src/dark-factory/config/usage-accounts.yaml}"

# Project root (absolute path)
project_root: "${PROJECT_ROOT:/home/leo/src/dark-factory}"
