# Core orchestrator defaults — shipped as package data.
# Per-project config files override individual keys via deep merge.

# Concurrency
max_concurrent_tasks: 24
max_per_module: 1
lock_depth: 4
module_overrides: {}

# Iteration limits
max_execute_iterations: 10
max_verify_attempts: 5
max_review_cycles: 2

# Steward lifecycle
steward_lifetime_budget: 12.0
steward_max_retries: 3
steward_completion_timeout: 300.0

# Wall-clock backstop for any single agent invocation (seconds)
invocation_timeout: 1200.0

# Models per role
models:
  architect: "opus"
  implementer: "sonnet"
  debugger: "sonnet"
  reviewer: "sonnet"
  merger: "opus"
  steward: "opus"
  module_tagger: "sonnet"
  deep_reviewer: "opus"

# Budget per invocation (USD)
budgets:
  architect: 8.0
  implementer: 10.0
  debugger: 5.0
  reviewer: 2.0
  merger: 5.0
  steward: 5.0
  module_tagger: 2.0
  deep_reviewer: 15.0

# Turn limits per invocation
max_turns:
  architect: 75
  implementer: 80
  debugger: 50
  reviewer: 30
  merger: 50
  steward: 100
  module_tagger: 30
  deep_reviewer: 100

# Reasoning effort per role
effort:
  architect: "max"
  implementer: "max"
  debugger: "max"
  reviewer: "medium"
  merger: "max"
  steward: "high"
  module_tagger: "medium"
  deep_reviewer: "max"

# Backend CLI per role (claude, codex, gemini)
backends:
  architect: "claude"
  implementer: "claude"
  debugger: "claude"
  reviewer: "claude"
  merger: "claude"
  steward: "claude"
  module_tagger: "claude"
  deep_reviewer: "claude"

# Review checkpoints
review:
  enabled: true
  interval: 12
  full_review_on_complete: true
  briefing_path: "review/briefing.yaml"
  reports_dir: "data/review-checkpoints"

# Sandbox
sandbox:
  enabled: false

# Escalation
escalation:
  queue_dir: "data/escalations"
  port: 8100
  host: "127.0.0.1"

# Git
git:
  main_branch: "main"
  branch_prefix: "task/"
  remote: "origin"
  worktree_dir: ".worktrees"

# Usage cap handling — multi-account failover
usage_cap:
  enabled: true
  pause_threshold: 0.96
  wait_for_reset: true
  probe_interval_secs: 300
  max_probe_interval_secs: 1800
  accounts:
    - name: max-c
      oauth_token_env: CLAUDE_OAUTH_TOKEN_C
    - name: max-b
      oauth_token_env: CLAUDE_OAUTH_TOKEN_B
    - name: max-d
      oauth_token_env: CLAUDE_OAUTH_TOKEN_D
#    - name: max-a
#      oauth_token_env: CLAUDE_OAUTH_TOKEN_A
