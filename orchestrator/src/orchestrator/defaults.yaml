# Core orchestrator defaults — shipped as package data.
# Per-project config files override individual keys via deep merge.

# Concurrency
max_concurrent_tasks: 24
max_per_module: 1
lock_depth: 4
module_overrides: {}

# Iteration limits
max_execute_iterations: 10
max_verify_attempts: 5
max_review_cycles: 2
reviewer_stagger_secs: 2.0
max_reviewer_retries: 4
max_amendment_rounds: 1

# Merge conflict reduction
max_advance_attempts: 3
max_pre_merge_retries: 2
max_merge_retries: 3
inter_iteration_rebase: true

# Verification timeouts
verify_command_timeout_secs: 1800
# Cold-build timeout: used for the *first* verify in a freshly created worktree
# (before the .task/verify_warmed marker exists — i.e., before cargo/build cache
# is populated).  After the first non-timeout run, subsequent verifies use
# verify_command_timeout_secs.  Set to null to disable the cold window and always
# use verify_command_timeout_secs.  Default = 3× warm (90 min) to accommodate
# cold OCCT + Tauri + full workspace builds seen in the reify escalation cluster.
verify_cold_command_timeout_secs: 5400
verify_timeout_retries: 2

# Verification execution mode + environment injection
concurrent_verify: true
verify_env: {}
# Task-phase verify rewrites cargo --workspace → cargo -p <crate> when
# all task files live in one (or a few) workspace crates.
scope_cargo: true

# Steward lifecycle
steward_lifetime_budget: 12.0
steward_max_attempts: 1
steward_completion_timeout: 900.0
steward_max_timeouts_per_escalation: 3

# Pre-triage threshold for review suggestions (count)
suggestion_triage_threshold: 10

# Wall-clock backstop for any single agent invocation (seconds).
# Legacy scalar — per-role timeouts below take precedence.
invocation_timeout: 7200.0

# Per-role wall-clock timeout (seconds)
timeouts:
  architect: 2400
  implementer: 1200
  debugger: 1200
  reviewer: 1200
  merger: 600
  steward: 1800
  triage: 300
  module_tagger: 300
  deep_reviewer: 2400
  judge: 300

# Models per role
models:
  architect: "opus"
  implementer: "sonnet"
  debugger: "sonnet"
  reviewer: "opus"
  merger: "opus"
  steward: "opus"
  triage: "sonnet"
  module_tagger: "sonnet"
  deep_reviewer: "opus"
  judge: "sonnet"

# Budget per invocation (USD)
budgets:
  architect: 12.0
  implementer: 10.0
  debugger: 5.0
  reviewer: 5.0
  merger: 5.0
  steward: 5.0
  triage: 2.0
  module_tagger: 2.0
  deep_reviewer: 15.0
  judge: 0.50

# Turn limits per invocation
max_turns:
  architect: 100
  implementer: 80
  debugger: 50
  reviewer: 30
  merger: 50
  steward: 100
  triage: 25
  module_tagger: 30
  deep_reviewer: 100
  judge: 15

# Reasoning effort per role
effort:
  architect: "max"
  implementer: "max"
  debugger: "max"
  reviewer: "high"
  merger: "max"
  steward: "high"
  triage: "medium"
  module_tagger: "medium"
  deep_reviewer: "max"
  judge: "medium"

# Backend CLI per role (claude, codex, gemini)
backends:
  architect: "claude"
  implementer: "claude"
  debugger: "claude"
  reviewer: "claude"
  merger: "claude"
  steward: "claude"
  triage: "claude"
  module_tagger: "claude"
  deep_reviewer: "claude"
  judge: "claude"

# Review checkpoints
review:
  enabled: true
  interval: 40
  full_review_on_complete: true
  briefing_path: "review/briefing.yaml"
  reports_dir: "data/review-checkpoints"

# Scheduler fairness — anti-starvation for broad-footprint tasks.
# Install a short-lived module reservation once a top-ranked candidate has
# been skipped N times in a row; lease scales with observed task duration.
#
# Per-tier skip_threshold / lease_multiplier: high-value tiers park quickly
# with a long lease; low-value tiers are effectively opted out of parking
# (threshold 9999 == "never park").  Once a threshold reaches >= 1000, the
# task_skipped event stream is rate-limited to geometric counts so the event
# store is not flooded with perpetual-loser diagnostics.
fairness:
  skip_threshold:
    critical: 1
    high: 2
    medium: 6
    low: 9999
    polish: 9999
  lease_multiplier:
    critical: 8.0
    high: 8.0
    medium: 5.0
    low: 2.0
    polish: 2.0
  lease_min_secs: 60.0
  lease_max_secs: 3600.0
  median_window: 50

# Value/h scheduler scoring knobs.
#   score(t) = TIER_BASE[eff_priority(t)]
#            + min(age_alpha * age + cpm_beta * log1p(transitive_dependents),
#                  TIER_WIDTH - 1)
# Age is proxied by (max_id - task_id): the number of newer tasks created
# since this one first went pending.  Resurrected cancelled tasks reset
# their age anchor — they do not inherit accumulated age.
age_alpha: 10.0
cpm_beta: 100.0

# Gentle per-tier slot caps (fraction of max_concurrent_tasks reserved for
# that tier or higher).  Missing entries default to 1.0 (no cap).  Parks
# override tier caps — once a fairness reservation is installed, the owner
# dispatches even if the cap would otherwise reject.
tier_slot_caps:
  critical: 1.0
  high: 1.0
  medium: 0.95
  low: 0.9
  polish: 0.9

# Sandbox
sandbox:
  enabled: false

# Escalation
escalation:
  queue_dir: "data/escalations"
  port: 8100
  host: "127.0.0.1"

# Git
git:
  main_branch: "main"
  branch_prefix: "task/"
  remote: "origin"
  worktree_dir: ".worktrees"

# Usage cap handling — multi-account failover
usage_cap:
  enabled: true
  pause_threshold: 0.96
  wait_for_reset: true
  probe_interval_secs: 300
  max_probe_interval_secs: 1800
  accounts_file: "${DARK_FACTORY_ROOT:/home/leo/src/dark-factory}/config/usage-accounts.yaml"
