[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/orchestrator"]

[project]
name = "orchestrator"
version = "0.1.0"
description = "Agent orchestration system — decomposes PRDs into concurrent TDD workflows"
requires-python = ">=3.11,<4"
dependencies = [
    "click>=8.0",
    "httpx>=0.27",
    "pydantic>=2.7",
    "pydantic-settings>=2.0",
    "pyyaml>=6.0",
    "escalation",
    "dark-factory-shared",
]

[tool.uv.sources]
escalation = { workspace = true }
dark-factory-shared = { workspace = true }

[project.scripts]
orchestrator = "orchestrator.cli:main"

[tool.pyright]
include = ["src", "tests"]
extraPaths = ["src", "../shared/src", "../escalation/src"]
pythonVersion = "3.11"
typeCheckingMode = "basic"

[tool.ruff]
line-length = 100

[tool.ruff.lint]
select = ["E", "F", "UP", "B", "SIM", "I"]
ignore = ["E501"]

[tool.ruff.format]
quote-style = "single"
indent-style = "space"
docstring-code-format = true

[dependency-groups]
dev = [
    "pyright>=1.1.404",
    "pytest>=8.0.0",
    "pytest-asyncio>=0.21.0",
    "pytest-timeout>=2.4.0",
    "ruff>=0.7.1",
]
