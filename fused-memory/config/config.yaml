# Fused Memory MCP Server Configuration
# Supports ${VAR_NAME} and ${VAR_NAME:default_value} environment variable expansion

server:
  transport: "http"
  host: "0.0.0.0"
  port: 8002
  stateless_http: true
  json_response: true
  keepalive_timeout: 120

llm:
  provider: "openai"
  model: "gpt-4o-mini"
  max_tokens: 4096

  providers:
    openai:
      api_key: ${OPENAI_API_KEY}
      api_url: ${OPENAI_API_URL:https://api.openai.com/v1}

    anthropic:
      api_key: ${ANTHROPIC_API_KEY}
      api_url: ${ANTHROPIC_API_URL:https://api.anthropic.com}

embedder:
  provider: "openai"
  model: "text-embedding-3-small"
  dimensions: 1536

  providers:
    openai:
      api_key: ${OPENAI_API_KEY}
      api_url: ${OPENAI_API_URL:https://api.openai.com/v1}

graphiti:
  provider: "falkordb"
  falkordb:
    uri: ${FALKORDB_URI:redis://localhost:6379}
    password: ${FALKORDB_PASSWORD:}
    # database is derived per-request from group_id (= project_id)

mem0:
  qdrant_url: ${QDRANT_URL:http://localhost:6333}
  collection_prefix: "fused"

routing:
  confidence_threshold: 0.7
  use_heuristics: true
  llm_fallback: true

queue:
  semaphore_limit: ${SEMAPHORE_LIMIT:3}
  workers_per_group: ${QUEUE_WORKERS_PER_GROUP:1}
  graphiti_max_coroutines: ${GRAPHITI_MAX_COROUTINES:5}
  max_attempts: ${QUEUE_MAX_ATTEMPTS:5}
  retry_base_seconds: ${QUEUE_RETRY_BASE:5}
  retry_max_delay_seconds: ${QUEUE_RETRY_MAX_DELAY:300}
  write_timeout_seconds: ${QUEUE_WRITE_TIMEOUT:120}
  backend_read_timeout_seconds: ${BACKEND_READ_TIMEOUT:30}
  backend_write_timeout_seconds: ${BACKEND_WRITE_TIMEOUT:120}
  search_timeout_seconds: ${SEARCH_TIMEOUT:30}
  data_dir: "${QUEUE_DATA_DIR:./data/queue}"

taskmaster:
  transport: "stdio"
  command: "node"
  args: ["${TASKMASTER_DIR:./taskmaster-ai}/dist/mcp-server.js"]
  project_root: "${PROJECT_ROOT:.}"
  tool_mode: "all"

reconciliation:
  enabled: true
  data_dir: "${RECONCILIATION_DATA_DIR:./data/reconciliation}"
  buffer_size_threshold: 250
  max_staleness_seconds: 14400
  conditional_trigger_ratio: 0.2
  burst_window_seconds: 30
  burst_cooldown_seconds: 150
  stale_lock_seconds: 7200
  agent_llm_provider: "claude_cli"
  agent_llm_model: "sonnet"
  agent_max_steps: 50
  tool_timeout_seconds: ${RECON_TOOL_TIMEOUT:120}
  stage_timeout_seconds: ${RECON_STAGE_TIMEOUT:3600}
  cycle_timeout_seconds: ${RECON_CYCLE_TIMEOUT:86400}
  judge_enabled: true
  judge_llm_provider: "claude_cli"
  judge_llm_model: "sonnet"
  explore_codebase_root: "${PROJECT_ROOT:.}"
  # Escalation
  escalation_port: ${RECON_ESCALATION_PORT:8103}
  escalation_host: "127.0.0.1"
  escalation_queue_dir: "${RECONCILIATION_DATA_DIR:./data/reconciliation}/escalations"
  # Tiered models
  sonnet_model: "sonnet"
  opus_model: "opus"
  opus_threshold_ratio: 1.5
  sonnet_episode_limit: 125
  sonnet_memory_limit: 250
  opus_episode_limit: 500
  opus_memory_limit: 1000
  # Token-budget context assembly
  token_budget: 65000
  context_search_limit: 5
  context_fetch_batch_size: 10
  usage_cap:
    enabled: true
    pause_threshold: 0.96
    wait_for_reset: true
    probe_interval_secs: 300
    max_probe_interval_secs: 1800
    accounts_file: "${DARK_FACTORY_ROOT:/home/leo/src/dark-factory}/config/usage-accounts.yaml"
