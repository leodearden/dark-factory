[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/fused_memory"]

[project]
name = "fused-memory"
version = "0.1.0"
description = "Fused Memory MCP Server — unified Graphiti + Mem0 memory system"
requires-python = ">=3.11,<4"
dependencies = [
    "graphiti-core[falkordb]>=0.28.1",
    "mem0ai>=1.0.10",
    "mcp>=1.9.4",
    "pydantic>=2.7",
    "pydantic-settings>=2.0",
    "pyyaml>=6.0",
    "openai>=1.90.0",
    "anthropic>=0.52.0",
    "aiosqlite>=0.20.0",
    "dark-factory-shared",
]

[tool.uv.sources]
dark-factory-shared = { workspace = true }
escalation = { workspace = true }

[tool.pytest.ini_options]
pythonpath = ["src"]
asyncio_mode = "strict"
addopts = "-n auto --dist loadgroup"
# Default per-test timeout. Catches accidental asyncio-sleep hangs (misconfigured
# UsageGate mock returning a truthy MagicMock from slot.detect_cap_hit — see
# shared.testing.make_gate_mock) and the TaskInterceptor._curator_worker
# queue.get() infinite loop (see fused_memory.middleware.task_interceptor).
# Slow tests opt out with @pytest.mark.timeout(N).
# thread method is load-bearing: signal method only works in the main thread and
# is incompatible with pytest-xdist ("-n auto --dist loadgroup" above). thread
# terminates hung tests via _thread.interrupt_main/os._exit — less clean than
# signal, but the only xdist-compatible option. (shared/pyproject.toml uses
# signal and warns thread "can't interrupt a blocking asyncio.sleep"; that caveat
# applies to C-level blocking syscalls like selector.poll, not pure-Python
# asyncio.sleep, which both methods catch.)
timeout = 60
timeout_method = "thread"

[tool.pyright]
include = ["src", "tests"]
extraPaths = ["src", "../shared/src", "../escalation/src"]
pythonVersion = "3.11"
typeCheckingMode = "basic"

[tool.ruff]
line-length = 100

[tool.ruff.lint]
select = ["E", "F", "UP", "B", "SIM", "I"]
ignore = ["E501"]

[tool.ruff.format]
quote-style = "single"
indent-style = "space"
docstring-code-format = true

[dependency-groups]
dev = [
    "pyright>=1.1.404",
    "pytest>=8.0.0",
    "pytest-asyncio>=0.21.0",
    "pytest-timeout>=2.4.0",
    "pytest-xdist>=3.5.0",
    "ruff>=0.7.1",
    "escalation",
]
