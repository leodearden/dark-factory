# Shared Claude Max account pool — single source of truth.
# Both orchestrator and fused-memory reconciliation reference this file
# via usage_cap.accounts_file in their respective configs.
#
# Order matters: accounts are tried in list order during failover.
# Account A is reserved for interactive sessions (commented out).

accounts:
  - name: max-g
    oauth_token_env: CLAUDE_OAUTH_TOKEN_G
  - name: max-f
    oauth_token_env: CLAUDE_OAUTH_TOKEN_F
  - name: max-e
    oauth_token_env: CLAUDE_OAUTH_TOKEN_E
  - name: max-c
    oauth_token_env: CLAUDE_OAUTH_TOKEN_C
  - name: max-b
    oauth_token_env: CLAUDE_OAUTH_TOKEN_B
  - name: max-d
    oauth_token_env: CLAUDE_OAUTH_TOKEN_D
#  - name: max-a
#    oauth_token_env: CLAUDE_OAUTH_TOKEN_A
