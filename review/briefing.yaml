# Review briefing — contextualises /review runs with durable project truths.
# Auto-generated by /review-briefing. Human edits preserved on update.
# Last updated: 2026-03-25T22:00:00Z

project: dark-factory

# Current focus: stability and robustness. Prioritize findings that affect
# data integrity, resource leaks, and crash recovery over feature gaps.

# Conventions and rules with teeth — violations are always bugs.
conventions:
  - rule: "All task operations route through fused-memory MCP tools, never Taskmaster directly"
    why: "TaskInterceptor must see every state transition to trigger reconciliation; bypassing it causes memory/task desync"

  - rule: "LLM prompts use system/user message split, not f-string interpolation"
    why: "Prompt injection mitigation — user content must never be interpolated into system prompts (commit 163594a)"

  - rule: "Orchestrator agents use OAuth tokens, not ANTHROPIC_API_KEY"
    why: "API key is stripped from subprocess env in cli_invoke.py to prevent accidental direct API billing; forces Max subscription usage"

  - rule: "Task project_root must be an absolute path — empty/relative/None is rejected"
    why: "Cross-project contamination fix — _base_args used to silently fall back to server default, routing all projects to dark-factory"

  - rule: "Active databases live at data/ (repo root), not fused-memory/data/"
    why: "Fused-memory config uses relative paths that resolve against systemd CWD (repo root). Exception: fused-memory/data/qdrant/ is live Qdrant storage"

  - rule: "FalkorDB and Qdrant run as native host processes, not via docker-compose"
    why: "docker-compose.yml exists but is not the active deployment model; services run natively with systemd/manual management"

  - rule: "Only port 8002 is the canonical fused-memory HTTP endpoint"
    why: "Ports 8000/8001 are stale Claude Code MCP instances running old code; any client should only connect to 8002"

  - rule: "MEM0_TELEMETRY must be set to false in fused-memory's environment"
    why: "mem0's capture_event() creates a new Posthog Consumer thread per API call, leaking ~8000 threads/day and causing 1400% CPU"

  - rule: ".task/ directories must never be committed to main"
    why: "Per-task plan.json/iterations.jsonl artifacts from worktrees contaminate later unrelated worktrees if they land on main"

subprojects:
  fused-memory:
    purpose: >
      Unified memory backbone. Combines Graphiti (temporal knowledge graph on FalkorDB)
      and Mem0 (vector store on Qdrant) behind a single MCP interface, proxies Taskmaster
      for task management, and runs automatic reconciliation on state transitions.
      If this doesn't work, nothing else in the factory works.

    key_scenarios:
      - "A memory written via add_memory is retrievable via search across sessions (the core value prop)"
      - "Task status changes trigger targeted reconciliation automatically — completion knowledge is written, dependent tasks get memory_hints"
      - "The durable SQLite write queue survives crashes without losing Graphiti writes"
      - "The three-stage reconciliation pipeline (consolidate → task-knowledge sync → integrity check) runs to completion without corrupting data"
      - "Multiple concurrent MCP clients share state correctly through the singleton server instance"
      - "Thread count stays stable over time — no resource leaks from telemetry, backends, or reconciliation subprocesses"

    what_working_means:
      - "Server starts on port 8002, singleton lock prevents duplicate instances"
      - "get_status returns healthy for all backends (Graphiti, Mem0, Taskmaster)"
      - "Unit tests pass — they mock backends so no running services needed"
      - "Thread monitor shows stable ~9 threads over time (no leak)"
      - "Memories route correctly by category: entities/temporal/decisions → Graphiti, preferences/procedural/observations → Mem0"

    key_decisions:
      - decision: "Two-tier write classification — heuristic regex first, LLM fallback if ambiguous"
        why: "Latency matters for the fast path; most queries are classifiable by keyword patterns alone"

      - decision: "Reconciliation stages run as Claude CLI subprocesses, not in-process agents"
        why: "Stages need MCP tool access; CLI provides that without reimplementing the protocol. Per-stage permissions enforced via --disallowedTools"

      - decision: "SQLite durable queue instead of in-memory queue"
        why: "Crash safety — Graphiti writes take seconds and losing them is unacceptable"

      - decision: "Singleton lock via abstract Unix socket"
        why: "Found 6 concurrent stale instances causing task tree corruption and data integrity issues; systemd Restart=on-failure would spawn new instances without killing orphans"

      - decision: "Write deference during full reconciliation cycles"
        why: "Targeted-recon writes are deferred to a table and replayed after the cycle, preventing conflicts with the consolidation stage"

    known_gaps:
      - what: "No e2e integration tests against real FalkorDB/Qdrant"
        why: "Infrastructure complexity; unit tests cover routing/classification/queue logic"
        tracking: null

      - what: "Legacy QueueService still in codebase alongside DurableWriteQueue"
        why: "Superseded, removal deferred — low priority"
        tracking: null

      - what: "Cap detection relies on text-pattern matching of CLI stdout/stderr"
        why: "No structured error code from Claude CLI; fragile against future phrasing changes"
        tracking: null

    exclude:
      - "dark_factory/, reify/ — untracked symlink artifacts, not application code"
      - "docker/ — infrastructure config, not actively used for deployment"
      - "maintenance/ scripts — one-off database repair tools for specific incidents, not part of the running server"

  orchestrator:
    purpose: >
      Decomposes PRDs into task trees and implements them via coordinated AI agents
      in isolated git worktrees. The engine that turns specifications into working code
      without human intervention under normal conditions.

    key_scenarios:
      - "A PRD is parsed into tasks, scheduled respecting module locks, and implemented concurrently"
      - "Each task goes through PLAN → EXECUTE → VERIFY → REVIEW → MERGE without human intervention"
      - "Escalations are handled by the steward (persistent Claude session) before reaching the user"
      - "Crashed runs recover work-in-progress from surviving worktrees — completed steps preserved"
      - "Merge happens in an isolated temporary worktree, never in the main working tree"
      - ".task/ artifacts stay in worktrees and never land on main"

    what_working_means:
      - "CLI starts and parses arguments correctly"
      - "Unit tests pass"
      - "A dry run successfully parses a PRD into a task tree"
      - "Tasks produce commits on main with no .task/ directory contamination"

    key_decisions:
      - decision: "Multi-provider agent invocation (Claude, Codex, Gemini) via eval-driven selection"
        why: "Different providers excel at different task types and price points; tiered routing recommended by eval results"

      - decision: "Git worktree isolation per task"
        why: "Prevents merge conflicts between concurrent tasks; each works on a clean branch"

      - decision: "Module-level hierarchical locking in the scheduler"
        why: "Parent/child paths conflict but siblings are independent — prevents two tasks from modifying overlapping files"

      - decision: "Merge via git update-ref in temporary worktree, not in the main working tree"
        why: "Atomic pointer update only after post-merge verification passes; serialized by _merge_lock"

      - decision: "Per-task verification scoped to task files, not whole codebase"
        why: "Fast per-task verification; integration-level regressions caught at post-merge step"

    known_gaps:
      - what: "Bubblewrap sandbox disabled"
        why: "Bun segfault on kernel 6.17; agents run without filesystem isolation"
        tracking: null

      - what: "orchestrator/usage_gate.py not yet unified with shared/usage_gate.py"
        why: "Extraction to shared was additive; orchestrator's copy may have drifted"
        tracking: null

    exclude:
      - "evals/tasks/, evals/results/ — evaluation fixtures and output data"

  shared:
    purpose: >
      Internal library providing Claude CLI invocation wrapper and multi-account
      usage gate (OAuth failover across Max subscription accounts). Exists so
      fused-memory and orchestrator share this code without circular dependencies.

    key_scenarios:
      - "invoke_claude_agent shells out to Claude CLI and returns structured AgentResult"
      - "Session resume via --resume for long-running steward conversations"
      - "invoke_with_cap_retry automatically fails over to backup OAuth accounts when usage caps are hit"
      - "Per-session budget enforcement prevents runaway spending"

    what_working_means:
      - "Unit tests pass (all CLI invocations mocked)"
      - "ANTHROPIC_API_KEY is stripped from subprocess env (forces OAuth)"
      - "Cap detection phrases match current Claude CLI output"

    key_decisions:
      - decision: "Cap detection via text-pattern matching on stdout/stderr"
        why: "No structured error code from CLI; scans for phrases like 'You've hit your' and 'RESOURCE_EXHAUSTED'"

      - decision: "Usage gates are per-process, not globally coordinated"
        why: "Simplicity; two concurrent processes maintain independent gate state"

    known_gaps:
      - what: "No cross-process usage gate coordination"
        why: "Orchestrator and fused-memory reconciliation each have their own gate instance; could cause both to hit the same account simultaneously"
        tracking: null

    exclude: []

  dashboard:
    purpose: >
      Read-only monitoring web UI (FastAPI + htmx + Jinja2). Gives a human operator
      a live, auto-refreshing view of memory health, write queue status, reconciliation
      activity, orchestrator progress, and historical performance metrics.

    key_scenarios:
      - "Watching an orchestrator run in real time with per-task progress"
      - "Checking memory subsystem health — Graphiti, Mem0, queue status"
      - "Inspecting reconciliation pipeline history — runs, events, judge verdicts"
      - "Reviewing memory write patterns and factory performance metrics"

    what_working_means:
      - "Server starts on port 8080 and loads a page with all sections"
      - "Health cards show live data from fused-memory on port 8002"
      - "Graceful degradation when fused-memory or SQLite DBs are unavailable"
      - "Tests pass covering routes, data layer, and template rendering"

    key_decisions:
      - decision: "htmx with morph:innerHTML swap mode"
        why: "DOM-diffs in place, preserving Alpine.js collapse state and avoiding Chart.js flicker on re-render"

      - decision: "Direct SQLite reads for reconciliation/performance data"
        why: "Read-only URI mode (mode=ro) on the same DBs fused-memory writes; avoids adding API endpoints for monitoring"

    known_gaps:
      - what: "Dashboard fans out to ports 8002, 8000, 8001 for some MCP calls"
        why: "Legacy workaround for stale instances; should only use 8002"
        tracking: null

    exclude:
      - "static/ — vendored CSS/JS assets"

  escalation:
    purpose: >
      Filesystem-based escalation queue and MCP server. Implements a two-level
      interrupt mechanism: level-0 (agent → steward, autonomous) and level-1
      (steward → human). Uses plain JSON files with atomic tmp-rename writes.

    key_scenarios:
      - "Blocking escalation pauses the agent until the steward resolves it"
      - "Steward re-escalates to human (level 1) on budget exhaustion or repeated failure"
      - "Non-blocking info escalations queued for async steward handling"
      - "Stale escalations auto-dismissed on orchestrator restart after crash"
      - "Resolution text injected into next agent briefing as the feedback mechanism"

    what_working_means:
      - "Unit tests pass (queue atomicity, dismiss, watcher behavior)"
      - "Escalation JSON files appear in data/escalations/ during orchestrator runs"
      - "Blocking escalations transition pending → resolved before agent resumes"

    key_decisions:
      - decision: "Filesystem queue (JSON files), not a message broker"
        why: "Survives crashes without infrastructure; stale-dismissal logic handles cleanup. Tradeoff: linear scan on get_pending()"

      - decision: "Steward is a persistent Claude session (--resume) with $12 lifetime budget"
        why: "Accumulates context across multiple escalations for the same task; budget cap forces re-escalation to human rather than silent runaway"

    known_gaps: []

    exclude: []

# Recurring stability issues — these are the highest-priority review targets.
# A reviewer should actively look for regressions or new instances of these patterns.
stability_concerns:
  - area: "Thread leaks in fused-memory"
    history: >
      mem0's Posthog telemetry created ~8000 threads/day. Fixed via MEM0_TELEMETRY=false.
      Thread monitor (60s interval, warn >30) added for early detection.
    what_to_check: "Any new per-call object instantiation that spawns threads; any code path that creates clients without cleanup"

  - area: "Task tree corruption from concurrent access"
    history: >
      Found 6 concurrent fused-memory instances sharing one Taskmaster subprocess.
      Fixed via singleton abstract Unix socket lock. Cross-project contamination
      fixed via _validate_project_root rejecting non-absolute paths.
    what_to_check: "Any path where task mutations could race; any fallback/default logic for project_root"

  - area: ".task/ directory contamination on main"
    history: >
      Per-task artifacts (plan.json, iterations.jsonl) from worktrees getting committed
      to main, then polluting later unrelated worktrees that branch from main.
    what_to_check: "Merge logic ensuring .task/ is excluded; .gitignore coverage; any code that stages files broadly (git add -A)"

# Excluded from review entirely — these are not dark-factory application code.
global_exclude:
  - "graphiti/ — vendored upstream Graphiti repository"
  - "mem0/ — vendored upstream Mem0 repository"
  - ".claude/worktrees/, .worktrees/, .eval-worktrees/ — ephemeral working directories"
  - "data/ — runtime databases and queue files"
  - ".taskmaster/ — Taskmaster AI state files"
