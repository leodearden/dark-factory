<!DOCTYPE html>
<html lang="en" class="h-full">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Dark Factory{% endblock %}</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/htmx.org@2.0.4"></script>
    <script src="https://unpkg.com/idiomorph@0.3.0/dist/idiomorph-ext.min.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.14.8/dist/cdn.min.js"></script>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body class="h-full bg-gray-900 text-gray-100" hx-ext="morph">
    <header class="border-b border-gray-700 px-6 py-4">
        <h1 class="text-xl font-semibold">Dark Factory</h1>
    </header>
    <main class="container mx-auto px-6 py-8">
        {% block content %}{% endblock %}
    </main>
    <script>
        (function () {
            function showError(evt) {
                var target = evt.detail.target;
                if (target) {
                    target.innerHTML = '<div class="bg-red-900/30 border border-red-800 rounded-lg p-4 text-red-300 text-sm">Failed to load \u2014 retrying...</div>';
                }
            }
            document.body.addEventListener('htmx:responseError', showError);
            document.body.addEventListener('htmx:timeout', showError);
            document.body.addEventListener('htmx:sendError', showError);
        })();
    </script>
</body>
</html>
