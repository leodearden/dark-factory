<!DOCTYPE html>
<html lang="en" class="h-full">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Dark Factory{% endblock %}</title>
    <link rel="icon" type="image/svg+xml" href="/static/favicon.svg">
    <link rel="stylesheet" href="/static/tailwind.css">
    <script src="https://unpkg.com/htmx.org@2.0.4"></script>
    <script src="https://unpkg.com/idiomorph@0.3.0/dist/idiomorph-ext.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.5.1/dist/chart.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2.2.0/dist/chartjs-plugin-datalabels.min.js"></script>
    <script>
        // Disable datalabels globally; individual charts opt in via plugins.datalabels.display: true
        if (typeof ChartDataLabels !== 'undefined') {
            Chart.defaults.plugins.datalabels = { display: false };
        }
    </script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.15.8/dist/cdn.min.js"></script>
    <script>
        document.addEventListener('alpine:init', () => {
            Alpine.store('panels', {});
        });
    </script>
</head>
<body class="h-full bg-gray-900 text-gray-100" hx-ext="morph">
    {% set active_cls = 'border-b-2 border-blue-500 text-white pb-1 text-sm font-medium' %}
    {% set inactive_cls = 'text-gray-400 hover:text-gray-200 pb-1 text-sm font-medium' %}
    <header class="border-b border-gray-700 px-6 py-4 flex items-center gap-6">
        <h1 class="text-xl font-semibold">Dark Factory</h1>
        <nav class="flex items-center gap-6">
            <a href="/" class="{{ active_cls if request.url.path == '/' else inactive_cls }}">Dashboard</a>
            <a href="/costs" class="{{ active_cls if request.url.path.startswith('/costs') else inactive_cls }}">Costs</a>
            <a href="/burndown" class="{{ active_cls if request.url.path.startswith('/burndown') else inactive_cls }}">Burndown</a>
        </nav>
    </header>
    <main class="container mx-auto px-6 py-8">
        {% block content %}{% endblock %}
    </main>
    <script>
        (function () {
            function showError(evt) {
                var target = evt.detail.target;
                if (target) {
                    target.innerHTML = '<div class="bg-red-900/30 border border-red-800 rounded-lg p-4 text-red-300 text-sm">Failed to load \u2014 retrying...</div>';
                }
            }
            document.body.addEventListener('htmx:responseError', showError);
            document.body.addEventListener('htmx:timeout', showError);
            document.body.addEventListener('htmx:sendError', showError);
        })();
        (function () {
            function markStampFailed(evt) {
                var section = evt.detail.target;
                var name = section && section.getAttribute('data-section');
                if (!name) return;
                var stamp = document.querySelector('[data-updated-for="' + name + '"]');
                if (!stamp) return;
                stamp.textContent = 'Update failed \u2014 retrying\u2026';
                stamp.setAttribute('data-update-failed', '1');
            }
            document.body.addEventListener('htmx:responseError', markStampFailed);
            document.body.addEventListener('htmx:timeout', markStampFailed);
            document.body.addEventListener('htmx:sendError', markStampFailed);
            document.body.addEventListener('htmx:afterSwap', function (evt) {
                var section = evt.detail.target;
                var name = section && section.getAttribute('data-section');
                if (!name) return;
                var stamp = document.querySelector('[data-updated-for="' + name + '"]');
                if (!stamp) return;
                stamp.removeAttribute('data-update-failed');
                stamp.setAttribute('data-updated-at', String(Date.now()));
                stamp.textContent = 'Updated just now';
                section.classList.add('section-refreshed');
                section.addEventListener('animationend', function () {
                    section.classList.remove('section-refreshed');
                }, { once: true });
                setTimeout(function () {
                    section.classList.remove('section-refreshed');
                }, 700);
            });
            var refreshTimer = setInterval(function () {
                var stamps = document.querySelectorAll('[data-updated-at]');
                stamps.forEach(function (el) {
                    if (el.getAttribute('data-update-failed')) return;
                    var ts = parseInt(el.getAttribute('data-updated-at'), 10);
                    if (isNaN(ts)) return;
                    var elapsed = Math.floor((Date.now() - ts) / 1000);
                    if (elapsed < 5) {
                        el.textContent = 'Updated just now';
                    } else if (elapsed < 60) {
                        el.textContent = 'Updated ' + elapsed + 's ago';
                    } else {
                        el.textContent = 'Updated ' + Math.floor(elapsed / 60) + 'm ago';
                    }
                });
            }, 1000);
        })();
    </script>
    <script>
        // Polling scheduler with three self-healing layers:
        //   1. Primary chain: htmx:afterSettle -> scheduleNext -> setTimeout -> htmx.trigger('poll')
        //   2. Visibility hook: pause polling while tab hidden, kick on visible
        //      (jittered 0-500ms to avoid a herd across tabs)
        //   3. Watchdog: every 5s, re-poll any section whose last-updated stamp
        //      is older than 2 * poll_base + 5s. Catches dropped afterSettle
        //      events, browser timer clamping, and JS edge-case stalls.
        (function () {
            var JITTER_RATIO = 0.2;
            var VISIBILITY_KICK_JITTER_MS = 500;
            var WATCHDOG_INTERVAL_MS = 5000;
            var WATCHDOG_TOLERANCE_SEC = 5;
            function scheduleNext(el) {
                if (document.visibilityState === 'hidden') {
                    clearTimeout(el._pollTimer);
                    return;
                }
                var base = el.dataset.pollBase;
                if (!base) { return; }
                var baseMs = parseInt(base, 10) * 1000;
                if (!Number.isFinite(baseMs) || baseMs <= 0) { return; }
                var jitter = baseMs * JITTER_RATIO * (2 * Math.random() - 1);
                var delay = Math.round(baseMs + jitter);
                clearTimeout(el._pollTimer);
                el._pollTimer = setTimeout(function () { htmx.trigger(el, 'poll'); }, delay);
            }
            document.body.addEventListener('htmx:afterSettle', function (evt) {
                var el = evt.detail.elt;
                if (el.dataset.pollBase) { scheduleNext(el); }
            });
            function recoverPoll(evt) {
                var el = (evt.detail.elt || evt.detail.target);
                if (!el) { return; }
                el = el.closest('[data-poll-base]');
                if (el) { scheduleNext(el); }
            }
            document.body.addEventListener('htmx:responseError', recoverPoll);
            document.body.addEventListener('htmx:timeout', recoverPoll);
            document.body.addEventListener('htmx:sendError', recoverPoll);

            document.addEventListener('visibilitychange', function () {
                if (document.visibilityState === 'visible') {
                    document.querySelectorAll('[data-poll-base]').forEach(function (el) {
                        var kickDelay = Math.floor(Math.random() * VISIBILITY_KICK_JITTER_MS);
                        setTimeout(function () { htmx.trigger(el, 'poll'); }, kickDelay);
                    });
                } else {
                    document.querySelectorAll('[data-poll-base]').forEach(function (el) {
                        clearTimeout(el._pollTimer);
                    });
                }
            });

            setInterval(function () {
                if (document.visibilityState !== 'visible') { return; }
                var now = Date.now();
                document.querySelectorAll('[data-poll-base]').forEach(function (el) {
                    var base = parseInt(el.dataset.pollBase, 10);
                    if (!Number.isFinite(base) || base <= 0) { return; }
                    var name = el.getAttribute('data-section');
                    var stamp = document.querySelector('[data-updated-for="' + name + '"]');
                    var ts = stamp && parseInt(stamp.getAttribute('data-updated-at'), 10);
                    if (!Number.isFinite(ts)) { return; }
                    var thresholdMs = (base * 2 + WATCHDOG_TOLERANCE_SEC) * 1000;
                    if (now - ts > thresholdMs) {
                        console.warn('[dashboard] watchdog re-polling stale section:',
                            name, 'age=' + Math.round((now - ts) / 1000) + 's');
                        htmx.trigger(el, 'poll');
                    }
                });
            }, WATCHDOG_INTERVAL_MS);
        })();
    </script>
</body>
</html>
