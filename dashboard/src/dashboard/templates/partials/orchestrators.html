<div>
  <div class="flex items-center gap-3 mb-6">
    <h2 class="text-xl font-bold text-gray-100">Orchestrators</h2>
    <span class="inline-block bg-blue-600 rounded-full px-2 text-sm text-white">{{ orchestrators|length }}</span>
  </div>

  {% if orchestrators %}
    {% for orch in orchestrators %}
      <div x-data="{ open: false }" class="bg-gray-800 rounded-lg p-6 mb-4">
        <div class="flex items-center gap-3">
          <span class="text-gray-100 font-semibold">PID {{ orch.pid }}</span>
          {% if orch.running %}
            <span class="inline-block px-2 py-0.5 text-xs font-medium rounded bg-green-600 text-white">running</span>
          {% else %}
            <span class="inline-block px-2 py-0.5 text-xs font-medium rounded bg-gray-600 text-white">completed</span>
          {% endif %}
          <span class="text-gray-400 text-sm">{{ orch.prd.split('/')[-1] }}</span>
        </div>
      </div>
    {% endfor %}
  {% else %}
    <p class="text-gray-400 text-center py-12">No orchestrators detected</p>
  {% endif %}
</div>
