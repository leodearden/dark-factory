{% if series %}
<div class="space-y-6">
  <h2 class="text-xl font-bold text-gray-100">Task Burndown</h2>
  {% for pid, data in series.items() %}
  <div class="bg-gray-800 rounded-lg p-4">
    <h3 class="text-sm font-medium text-gray-300 mb-3">{{ pid | project_name }}</h3>
    {% if data.labels %}
    <div style="height:280px; position:relative">
      <canvas id="burndown-{{ pid | css_id }}"></canvas>
    </div>
    {% else %}
    <p class="text-gray-500 text-sm py-8 text-center">No data for this window</p>
    {% endif %}
  </div>
  {% endfor %}
</div>

<script>
(function() {
  var allSeries = {{ series | tojson }};

  var zoneColors = {
    done:        '#34d399',
    cancelled:   '#6b7280',
    blocked:     '#f87171',
    deferred:    '#a78bfa',
    in_progress: '#60a5fa',
    pending:     '#fbbf24'
  };

  var zoneLabels = {
    done:        'Done',
    cancelled:   'Cancelled',
    blocked:     'Blocked',
    deferred:    'Deferred',
    in_progress: 'In Progress',
    pending:     'Pending'
  };

  // Bottom-to-top stacking order
  var zoneOrder = ['done', 'cancelled', 'blocked', 'deferred', 'in_progress', 'pending'];

  function getOrDestroyChart(canvasId) {
    var el = document.getElementById(canvasId);
    if (!el) return null;
    var existing = Chart.getChart(el);
    if (existing) existing.destroy();
    return el;
  }

  function formatLabel(iso) {
    var d = new Date(iso);
    var month = d.toLocaleString(undefined, { month: 'short' });
    var day = d.getDate();
    var h = d.getHours().toString().padStart(2, '0');
    var m = d.getMinutes().toString().padStart(2, '0');
    return month + ' ' + day + ' ' + h + ':' + m;
  }

  function renderAll() {
    for (var pid in allSeries) {
      if (!allSeries.hasOwnProperty(pid)) continue;
      var data = allSeries[pid];
      if (!data.labels || data.labels.length === 0) continue;

      // Build safe canvas ID matching the Jinja css_id filter
      var safeId = pid.replace(/[^a-zA-Z0-9_]/g, '_').replace(/_+/g, '_').replace(/^_|_$/g, '') || 'unknown';
      var el = getOrDestroyChart('burndown-' + safeId);
      if (!el) continue;

      var labels = data.labels.map(formatLabel);
      var datasets = zoneOrder.map(function(zone) {
        return {
          label: zoneLabels[zone],
          data: data[zone],
          backgroundColor: zoneColors[zone] + 'cc',
          borderColor: zoneColors[zone],
          borderWidth: 1,
          fill: true,
          pointRadius: 0,
          pointHitRadius: 6,
          tension: 0.3
        };
      });

      new Chart(el, {
        type: 'line',
        data: { labels: labels, datasets: datasets },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          interaction: { mode: 'index', intersect: false },
          scales: {
            x: {
              ticks: { color: '#9ca3af', maxTicksLimit: 12, maxRotation: 0 },
              grid: { color: 'rgba(75,85,99,0.3)' }
            },
            y: {
              stacked: true,
              beginAtZero: true,
              ticks: { color: '#9ca3af', precision: 0 },
              grid: { color: 'rgba(75,85,99,0.3)' },
              title: { display: true, text: 'Tasks', color: '#9ca3af' }
            }
          },
          plugins: {
            legend: {
              position: 'bottom',
              labels: { color: '#d1d5db', boxWidth: 12, padding: 16 }
            },
            tooltip: {
              mode: 'index',
              intersect: false,
              callbacks: {
                footer: function(items) {
                  var total = items.reduce(function(s, i) { return s + i.parsed.y; }, 0);
                  return 'Total: ' + total;
                }
              }
            }
          }
        }
      });
    }
  }

  requestAnimationFrame(function() {
    requestAnimationFrame(renderAll);
  });
})();
</script>

{% else %}
<div class="text-center py-16">
  <h2 class="text-xl font-bold text-gray-100 mb-2">Task Burndown</h2>
  <p class="text-gray-400">No burndown data yet &mdash; snapshots are collected every 10 minutes.</p>
</div>
{% endif %}
