{# Cost by project partial — horizontal stacked bar chart (cost by model per project) #}
<div>
  <h3 class="text-sm font-semibold text-gray-300 mb-4">Cost by Project</h3>
  {% if by_project %}
    <div class="bg-gray-800 rounded-lg p-4" style="height: 250px; position: relative">
      <canvas id="costByProjectChart"></canvas>
    </div>
  {% else %}
    <div class="text-gray-500 text-sm py-8 text-center">No cost data available for this window.</div>
  {% endif %}
</div>

<script>
(function() {
  var byProject = {{ by_project | tojson }};

  function renderChart() {
    var el = getOrDestroyChart('costByProjectChart');
    if (!el) return;

    // Collect all unique models across all projects
    var allModels = [];
    Object.values(byProject).forEach(function(models) {
      models.forEach(function(m) {
        if (allModels.indexOf(m.model) === -1) allModels.push(m.model);
      });
    });

    // Build labels (project names) and datasets (one per model)
    var labels = Object.keys(byProject);
    var datasets = allModels.map(function(model, idx) {
      return {
        label: model,
        data: labels.map(function(proj) {
          var found = (byProject[proj] || []).find(function(m) { return m.model === model; });
          return found ? found.total : 0;
        }),
        backgroundColor: CHART_PALETTE[idx % CHART_PALETTE.length],
      };
    });

    new Chart(el, {
      type: 'bar',
      data: { labels: labels, datasets: datasets },
      options: {
        indexAxis: 'y',
        responsive: true,
        maintainAspectRatio: false,
        plugins: {
          legend: { labels: { color: '#9ca3af', font: { size: 11 } } },
        },
        scales: {
          x: {
            stacked: true,
            ticks: { color: '#9ca3af', callback: function(v) { return '$' + v.toFixed(2); } },
            grid: { color: 'rgba(75,85,99,0.3)' },
          },
          y: {
            stacked: true,
            ticks: { color: '#9ca3af' },
            grid: { display: false },
          },
        },
      },
    });
  }

  renderChart();
})();
</script>
