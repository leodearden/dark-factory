{% extends "base.html" %}

{% block content %}
<div class="space-y-8 max-w-7xl mx-auto p-6">
    <!-- Memory Health -->
    <section
        hx-get="/partials/memory"
        hx-trigger="load, every 10s"
        hx-swap="morph:innerHTML"
        hx-request='{"timeout": 8000}'
    >
        <div class="animate-pulse space-y-3">
            <div class="h-4 bg-gray-700 rounded w-1/3"></div>
            <div class="h-32 bg-gray-800 rounded"></div>
        </div>
    </section>

    <!-- Reconciliation -->
    <section
        hx-get="/partials/recon"
        hx-trigger="load, every 15s"
        hx-swap="morph:innerHTML"
        hx-request='{"timeout": 12000}'
    >
        <div class="animate-pulse space-y-3">
            <div class="h-4 bg-gray-700 rounded w-1/3"></div>
            <div class="h-32 bg-gray-800 rounded"></div>
        </div>
    </section>

    <!-- Orchestrators -->
    <section
        hx-get="/partials/orchestrators"
        hx-trigger="load, every 10s"
        hx-swap="morph:innerHTML"
        hx-request='{"timeout": 8000}'
    >
        <div class="animate-pulse space-y-3">
            <div class="h-4 bg-gray-700 rounded w-1/3"></div>
            <div class="h-32 bg-gray-800 rounded"></div>
        </div>
    </section>

    <!-- Footer -->
    <footer class="text-center text-sm text-gray-500 pt-4 border-t border-gray-700">
        Dark Factory Dashboard
    </footer>
</div>
{% endblock %}
