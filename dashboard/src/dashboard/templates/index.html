{% extends "base.html" %}

{% block content %}
<div class="space-y-8 max-w-7xl mx-auto p-6">
    <!-- Orchestrators -->
    <div>
        <section
            data-section="orchestrators"
            hx-get="/partials/orchestrators"
            hx-trigger="load, every 10s"
            hx-swap="morph:innerHTML"
            hx-request='{"timeout": 8000}'
            aria-live="polite"
        >
            <div class="animate-pulse space-y-3">
                <div class="h-4 bg-gray-700 rounded w-1/3"></div>
                <div class="h-32 bg-gray-800 rounded"></div>
            </div>
        </section>
        <div class="text-xs text-gray-500 mt-1 h-4" data-updated-for="orchestrators" aria-hidden="true"></div>
    </div>

    <!-- Performance -->
    <div>
        <section
            data-section="performance"
            hx-get="/partials/performance"
            hx-trigger="load, every 30s"
            hx-swap="morph:innerHTML"
            hx-request='{"timeout": 12000}'
            aria-live="polite"
        >
            <div class="animate-pulse space-y-3">
                <div class="h-4 bg-gray-700 rounded w-1/3"></div>
                <div class="h-48 bg-gray-800 rounded"></div>
            </div>
        </section>
        <div class="text-xs text-gray-500 mt-1 h-4" data-updated-for="performance" aria-hidden="true"></div>
    </div>

    <!-- Memory Health -->
    <div>
        <section
            data-section="memory"
            hx-get="/partials/memory"
            hx-trigger="load, every 10s"
            hx-swap="morph:innerHTML"
            hx-request='{"timeout": 8000}'
            aria-live="polite"
        >
            <div class="animate-pulse space-y-3">
                <div class="h-4 bg-gray-700 rounded w-1/3"></div>
                <div class="h-32 bg-gray-800 rounded"></div>
            </div>
        </section>
        <div class="text-xs text-gray-500 mt-1 h-4" data-updated-for="memory" aria-hidden="true"></div>
    </div>

    <!-- Memory Graphs -->
    <div>
        <section
            data-section="memory-graphs"
            hx-get="/partials/memory-graphs"
            hx-trigger="load, every 60s"
            hx-swap="morph:innerHTML"
            hx-request='{"timeout": 10000}'
        >
            <div class="animate-pulse h-48 bg-gray-800 rounded"></div>
        </section>
        <div class="text-xs text-gray-500 mt-1 h-4" data-updated-for="memory-graphs" aria-hidden="true"></div>
    </div>

    <!-- Reconciliation -->
    <div>
        <section
            data-section="recon"
            hx-get="/partials/recon"
            hx-trigger="load, every 15s"
            hx-swap="morph:innerHTML"
            hx-request='{"timeout": 12000}'
            aria-live="polite"
        >
            <div class="animate-pulse space-y-3">
                <div class="h-4 bg-gray-700 rounded w-1/3"></div>
                <div class="h-32 bg-gray-800 rounded"></div>
            </div>
        </section>
        <div class="text-xs text-gray-500 mt-1 h-4" data-updated-for="recon" aria-hidden="true"></div>
    </div>

    <!-- Footer -->
    <footer class="text-center text-sm text-gray-500 pt-4 border-t border-gray-700">
        Dark Factory Dashboard
    </footer>
</div>
{% endblock %}
